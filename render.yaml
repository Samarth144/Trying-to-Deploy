databases:
  - name: resonance-db
    databaseName: resonance
    user: resonance_user
    plan: free
    region: singapore

services:
  # ─── Unified Web Service (Backend + AI Engine + Frontend) ──────────────────
  - type: web
    name: resonance-app
    env: docker
    region: singapore
    plan: free
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: LIGHT_MODE
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: resonance-db
          property: connectionString
      - key: AI_ENGINE_URL
        value: http://127.0.0.1:5000
      - key: ALLOWED_ORIGINS
        value: https://resonance-app.onrender.com
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 30d
      - key: AES_SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GEMINI_API_KEY
        sync: false
