databases:
  - name: resonance-db
    databaseName: resonance
    user: resonance_user
    plan: free
    region: singapore

services:
  # ─── AI Engine (Private Service) ──────────────────────────────────────────
  - type: pserv
    name: resonance-ai
    env: docker
    region: singapore
    plan: starter # Python AI needs at least 'starter' RAM
    dockerContext: ./ai_engine
    dockerfilePath: Dockerfile
    envVars:
      - key: FLASK_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false # Set in Dashboard to avoid GitHub secret scanning
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GEMINI_API_KEY
        sync: false

  # ─── Backend & Frontend (Public Web Service) ────────────────────────────────
  - type: web
    name: resonance-backend
    env: docker
    region: singapore
    plan: starter
    dockerContext: .
    dockerfilePath: Backend/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: resonance-db
          property: connectionString
      - key: AI_ENGINE_URL
        value: http://resonance-ai:5000
      - key: ALLOWED_ORIGINS
        value: https://resonance-backend.onrender.com
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 30d
      - key: AES_SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
