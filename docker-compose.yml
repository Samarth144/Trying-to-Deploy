services:
  # ─── PostgreSQL Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: resonance_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-neuro_onco_ai}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (Node.js/Express) + Frontend (served as static files) ──────────
  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    container_name: resonance_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      PORT: 8000
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-neuro_onco_ai}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      AES_SECRET_KEY: ${AES_SECRET_KEY:-64_char_hex_key_here}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      AI_ENGINE_URL: http://ai_engine:5000
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8000}
    volumes:
      - uploads_data:/app/uploads
      - ./reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy

  # ─── AI Engine (Python/Flask) ───────────────────────────────────────────────
  ai_engine:
    build:
      context: ./ai_engine
      dockerfile: Dockerfile
    container_name: resonance_ai_engine
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      REPORTS_DIR: /app/uploads/reports
      GENOMICS_DIR: /app/uploads/genomics
    volumes:
      - uploads_data:/app/uploads
      - ./genomics:/app/genomics:ro
      - ./reports:/app/reports

volumes:
  postgres_data:
  uploads_data:
